spring.application.name=backend

spring.datasource.url=jdbc:postgresql://localhost:5432/forgeops_db
spring.datasource.username=forgeops_user
spring.datasource.password=forgeops_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# JWT Configuration
# Note: In production, generate a secure, random 256-bit key and do not hardcode it here.
# For local dev, we use a 512-bit key encoded in base64.
forgeops.app.jwtSecret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
# Expiration: 1 hour (3600000 ms)
forgeops.app.jwtExpirationMs=3600000
# Refresh Expiration: 24 hours (86400000 ms)
forgeops.app.jwtRefreshExpirationMs=86400000
